<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="STQC GIGW 3.0 Web Accessibility Audit Tools - Comprehensive toolkit for testing government websites against WCAG standards.">
    <title>{% block title %}STQC Toolkit{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect x="2" y="2" width="36" height="36" rx="8" stroke="url(#logoGrad)" stroke-width="2.5"/>
                    <path d="M12 20 L20 12 L28 20 L20 28Z" fill="url(#logoGrad)" opacity="0.8"/>
                    <path d="M16 20 L20 16 L24 20 L20 24Z" fill="#0f1729"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#06b6d4"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="logo-text">
                <span class="logo-title">STQC</span>
                <span class="logo-subtitle">GIGW 3.0 Toolkit</span>
            </div>
        </div>

        <div class="nav-section">
            <span class="nav-label">Dashboard</span>
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}" id="nav-home">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Home</span>
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-label">Run Tools</span>
            <a href="/tool/crawler" class="nav-item {% if 'crawler' in request.path and 'summary' not in request.path %}active{% endif %}" id="nav-crawler">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                </svg>
                <span>Web Crawler</span>
            </a>
            <a href="/tool/alt-text" class="nav-item {% if 'alt-text' in request.path and 'summary' not in request.path %}active{% endif %}" id="nav-alt-text">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                <span>Alt Text Checker</span>
            </a>
            <a href="/tool/contrast" class="nav-item {% if 'contrast' in request.path and 'summary' not in request.path %}active{% endif %}" id="nav-contrast">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2v20" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 2a10 10 0 010 20" fill="currentColor" opacity="0.3"/>
                </svg>
                <span>Contrast Checker</span>
            </a>
            <a href="/tool/media" class="nav-item {% if 'media' in request.path and 'summary' not in request.path %}active{% endif %}" id="nav-media">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                </svg>
                <span>Media Crawler</span>
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-label">Reports</span>
            <a href="/summary/crawler" class="nav-item {% if 'summary/crawler' in request.path %}active{% endif %}" id="nav-summary-crawler">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span>Crawl Report</span>
            </a>
            <a href="/summary/alt-text" class="nav-item {% if 'summary/alt-text' in request.path %}active{% endif %}" id="nav-summary-alt">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <path d="M9 15l2 2 4-4"/>
                </svg>
                <span>Alt Text Report</span>
            </a>
            <a href="/summary/contrast" class="nav-item {% if 'summary/contrast' in request.path %}active{% endif %}" id="nav-summary-contrast">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="8" y1="18" x2="8" y2="15"/>
                    <line x1="16" y1="18" x2="16" y2="10"/>
                </svg>
                <span>Contrast Report</span>
            </a>
            <a href="/summary/media" class="nav-item {% if 'summary/media' in request.path %}active{% endif %}" id="nav-summary-media">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <rect x="8" y="12" width="8" height="6" rx="1"/>
                </svg>
                <span>Media Report</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-version">GIGW 3.0 • v1.0</div>
        </div>
    </nav>

    <!-- Mobile menu toggle -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
